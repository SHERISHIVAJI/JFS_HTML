<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fieldset element</title>
</head>

<body>
    <h1>FIELDSET ELEMENT</h1>

    <h3>Simple fieldset: </h3>
    <form>
        <fieldset></fieldset>
    </form>

    <h3>fieldset with legend: </h3>
    <form>
        <fieldset>
            <legend>Caption of the fieldset</legend>
        </fieldset>
    </form>

    <h3>fieldset with disabled attribute: </h3>
    <form action="/action_page.php">
        <fieldset disabled>
            <legend>Personalia:</legend>
            <label for="fname">First name:</label>
            <input type="text" id="fname" name="fname"><br><br>
            <label for="lname">Last name:</label>
            <input type="text" id="lname" name="lname"><br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email"><br><br>
            <label for="birthday">Birthday:</label>
            <input type="date" id="birthday" name="birthday"><br><br>
            <input type="submit" value="Submit">
        </fieldset>
    </form>

    <h3>fieldset with form attribute: </h3>
    <form action="/action_page.php" method="get" id="form1">
        <label for="favcolor">What is your favorite color?</label>
        <input type="text" id="favcolor" name="favcolor">
        <input type="submit">
    </form>

    <fieldset form="form1">
        <legend>Personalia:</legend>
        <label for="fname">First name:</label>
        <input type="text" id="fname" name="fname" form="form1"><br><br>
        <label for="lname">Last name:</label>
        <input type="text" id="lname" name="lname" form="form1">
    </fieldset>

    <h3>fieldset with name attribute: </h3>
    <form action="/action_page.php" method="get">
        <fieldset name="personalia">
            <legend>Personalia</legend>
            <label for="fname">First name:</label>
            <input type="text" id="fname" name="fname">
        </fieldset>
        <br>
        <button type="button" onclick="form.personalia.style.backgroundColor='yellow'">
            Change background color of fieldset</button>
        <input type="submit">
    </form>
</body>

</html>
