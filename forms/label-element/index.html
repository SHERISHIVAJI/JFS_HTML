<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>label element</title>
</head>

<body>
    <h1>LABEL ELEMENT</h1>

    <h3>Simple label: </h3>
    <form>
        <label>First Name: </label>
        <input type="text">
    </form>

    <h3>for: </h3>
    <form>
        <label for="fname">First Name: </label>
        <input type="text" id="fname">
    </form>
