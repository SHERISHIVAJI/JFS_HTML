<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1 popover id="myheader">Hello</h1>
    <input type="button" popovertarget="myheader" popovertargetaction="show" value="Click me!">

    <h1 popover id="myheader">Hello</h1>
    <input type="button" popovertarget="myheader" popovertargetaction="hide" value="Click me!">

    <h1 popover id="myheader">Hello</h1>
    <input type="button" popovertarget="myheader" popovertargetaction="toggle" value="Click me!">
</body>

</html>
