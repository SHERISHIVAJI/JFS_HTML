<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Number Pattern</title>
</head>
<body>
    <center>
        <h1>Mobile Number Pattern</h1>
        <form action="./patternSuccess.html">
            <label for="mobile">Enter mobile number : *</label>
            <input type="tel" name="mobile" id="mobile" pattern="^\+91\s[6-9]\d{9}" title="Enter number in '+91 XXXXXXXXXX' format." required autocomplete="off">
            <br> <br>
            <button>Submit</button>
        </form>
    </center>
</body>
</html>
