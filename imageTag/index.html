<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image in HTML</title>
</head>
<body>
    <h1>Image in HTML</h1>

    <h2>Simple image tag:</h2>
    <img src="./1770298735099.png" alt="SHERI SHIVAJI PROFILE PICTURE">

    <h2>Image with width and height:</h2>
    <img src="./1770298735099.png" alt="SHERI SHIVAJI PROFILE PICTURE" width="300" height="400">

    <h2>Image with title Attribute: </h2>
    <img src="./1770298735099.png" alt="SHERI SHIVAJI PROFILE PICTURE" title="SHERI SHIVAJI PROFILE PICTURE">

    <h2>Image with border attribute: </h2>
    <img src="./1770298735099.png" alt="SHERI SHIVAJI PROFILE PICTURE" border="3">

    <h2>Image with align attribute:</h2>
    <img src="./1770298735099.png" alt="SHERI SHIVAJI PROFILE PICTURE" align="right">

    <h2>Image with hspace and vspace:</h2>
    <img src="./1770298735099.png" alt="SHERI SHIVAJI PROFILE PICTURE" hspace="30" vspace="50">

    <h2>Image as a link</h2>
    <a href="./success.html">
        <img src="./1770298735099.png" alt="SHERI SHIVAJI PROFILE PICTURE">
    </a>

    <h2>Responsive Images with srcset and sizes:</h2>
    <img src="./1770298735099.png" srcset="1770298735099.png 1024w, 1770298735099.png 640w, 1770298735099.png 320w"
    sizes="(max-width: 640px) 100vw, 50vw" alt="Responsive Images">

    <h2>Image Loading Control</h2>
    <img src="./1770298735099.png" alt="Image Loading Control" loading="lazy">
    <img src="./1770298735099.png" alt="Image Loading Control" loading="eager">
</body>
</html>
