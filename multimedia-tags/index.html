<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia Tags in HTML</title>
</head>
<body>
    <h1>video Tag in HTML</h1>

    <h2>Simple video tag:</h2>
    <video src="./alavaikunthapurramuloo.mp4"></video>

    <h2>width and height attributes:</h2>
    <video src="./alavaikunthapurramuloo.mp4" width="300px" height="100%"></video>

    <h2>controls attribute:</h2>
    <video src="./alavaikunthapurramuloo.mp4" controls></video>

    <h2>autoplay, muted, and loop attribute:</h2>
    <video src="./alavaikunthapurramuloo.mp4" controls autoplay muted loop></video>

    <h2>poster attribute:</h2>
    <video src="./ammayi.mp4" poster="./1770298735099.png" controls muted></video>

    <h2>source element:</h2>
    <video src="./alavaikunthapurramuloo.mp4" controls>
        <source src="./ammayi.mp4">
    </video>

    <h2>Fallback content:</h2>
    <video src="./alavaikunthapurramulogdhjfttfchgvxjhvhggo.mp4">
        The path is wrong
    </video>

    <h2>video tag with preload: </h2>
    <video src="./ammayi.mp4" controls preload="metadata"></video>
</body>
</html>
