<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iframes in HTML</title>
</head>
<body>
    <h1>iframes in HTML</h1>

    <h2>Simple iframe:</h2>
    <iframe></iframe>

    <h2>iframe with src:</h2>
    <iframe src="https://sherishivaji.github.io/JFS_CSS/flex-in-css-practice/"></iframe>

    <h2>width and height of iframe:</h2>
    <iframe src="" width="500" height="300"></iframe>

    <h2>iframes without border:</h2>
    <iframe src="https://sherishivaji.github.io/JFS_CSS/flex-in-css-practice/" frameborder="0"></iframe>

    <h2>iframe targer for a link:</h2>
    <iframe src="./test.html" frameborder="1" name="testThis"></iframe>
    <p><a href="https://sherishivaji.github.io/JFS_CSS/flex-in-css-practice/" target="testThis">FLEX-BOX</a></p>

    <h2>Embed YouTube video using iframa:</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/GX9x62kFsVU?si=LWFtiGlpmnTL2UVu" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <h2>Attributes of iframes:</h2>
    <iframe src="https://www.youtube.com/embed/GX9x62kFsVU?si=LWFtiGlpmnTL2UVu" title="YouTube video player" allowfullscreen frameborder="0"></iframe>
</body>
</html>
